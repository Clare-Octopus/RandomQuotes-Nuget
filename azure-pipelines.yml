# ASP.NET Core (.NET Framework)
# Build and test ASP.NET Core projects targeting the full .NET Framework.
# Add steps that publish symbols, save build artifacts, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/dotnet-core

trigger:
- master

pool:
  vmImage: 'windows-latest'

variables:
  solution: '**/*.sln'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'

steps:
  - task: OctopusDeployToolInstaller@0
    inputs:
      installGoCli: true   # ensures the Go-based `octopus` binary is installed

  - script: |
      octopus runbook run \
        --project "RunbookADOTest" \
        --name "Runbook" \
        --environment "Dev" \
        --package-version "1.0.3" \
        --server "$(OctopusServerUrl)" \
        --api-key "${env:OCTOPUSAPIKEY}" \
        --space "Default"
    displayName: 'Run Octopus Runbook with pinned package version'
