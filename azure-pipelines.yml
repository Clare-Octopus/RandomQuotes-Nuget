trigger:
- master

pool:
  vmImage: 'windows-latest'

variables:
  solution: '**/*.sln'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'

steps:
- task: octopusdeploy.octopus-deploy-build-release-tasks.octo-installer.OctoInstaller@7
  displayName: 'Install Octopus CLI tool version '
  inputs:
    octopusVersion: 2.21.3

- pwsh: |
    $env:OCTOPUS_URL = "$(OctopusServerUrl)"
    $env:OCTOPUS_API_KEY = "$(OctopusApiKey)"

    $cliArgs = @(
      "--project", "RunbookADOTest",
      "--name", "Runbook",
      "--environment", "Dev",
      "--git-ref", "refs/heads/main",
      "--package-version", "1.0.3",
      "--space", "Default",
      "--no-prompt"
    )
    $output = & octopus runbook run @cliArgs 2>&1
    $output | ForEach-Object { Write-Host $_ }
    Write-Host ("Exit code: {0}" -f $LASTEXITCODE)
    if ($LASTEXITCODE -ne 0) {
      throw ("Octopus runbook run failed with exit code {0}" -f $LASTEXITCODE)
    }
  displayName: 'Run Octopus Runbook (CaC project) with pinned package version'